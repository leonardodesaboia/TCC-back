spring:
  application:
    name: allset-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt-secret: ${JWT_SECRET:}
cpf-encryption-key: ${CPF_ENCRYPTION_KEY:}
user-purge-cron: ${USER_PURGE_CRON:0 0 2 * * *}
subscription-expiration-cron: ${SUBSCRIPTION_EXPIRATION_CRON:0 */30 * * * *}
database-url: ${DATABASE_URL:}
db-user: ${DB_USER:}
db-pass: ${DB_PASS:}
redis-host: ${REDIS_HOST:localhost}
redis-port: ${REDIS_PORT:6379}
port: ${PORT:8080}

# Auth TTLs
access-token-ttl-minutes: ${ACCESS_TOKEN_TTL_MINUTES:15}
refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS:7}
reset-code-ttl-minutes: ${RESET_CODE_TTL_MINUTES:10}

# Email / Resend
resend-api-key: ${RESEND_API_KEY:}
email-from: ${EMAIL_FROM:}

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
