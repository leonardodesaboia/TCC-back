spring:
  application:
    name: allset-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt-secret: ${JWT_SECRET:}
cpf-encryption-key: ${CPF_ENCRYPTION_KEY:}
database-url: ${DATABASE_URL:}
db-user: ${DB_USER:}
db-pass: ${DB_PASS:}
redis-host: ${REDIS_HOST:localhost}
redis-port: ${REDIS_PORT:6379}
port: ${PORT:8080}

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
