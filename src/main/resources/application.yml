spring:
  application:
    name: allset-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

jwt-secret: ${JWT_SECRET:}
cpf-encryption-key: ${CPF_ENCRYPTION_KEY:}
user-purge-cron: ${USER_PURGE_CRON:0 0 2 * * *}
subscription-expiration-cron: ${SUBSCRIPTION_EXPIRATION_CRON:0 */30 * * * *}
push-token-prune-cron: ${PUSH_TOKEN_PRUNE_CRON:0 0 3 * * *}
database-url: ${DATABASE_URL:}
db-user: ${DB_USER:}
db-pass: ${DB_PASS:}
redis-host: ${REDIS_HOST:localhost}
redis-port: ${REDIS_PORT:6379}
port: ${PORT:8080}

# Auth TTLs
access-token-ttl-minutes: ${ACCESS_TOKEN_TTL_MINUTES:15}
refresh-token-ttl-days: ${REFRESH_TOKEN_TTL_DAYS:7}
reset-code-ttl-minutes: ${RESET_CODE_TTL_MINUTES:10}

# Email / Resend
resend-api-key: ${RESEND_API_KEY:}
email-from: ${EMAIL_FROM:}

# Express
express-pro-timeout-minutes: ${EXPRESS_PRO_TIMEOUT_MINUTES:10}
express-client-window-minutes: ${EXPRESS_CLIENT_WINDOW_MINUTES:30}
express-search-radius-km: ${EXPRESS_SEARCH_RADIUS_KM:15}
express-max-queue-size: ${EXPRESS_MAX_QUEUE_SIZE:10}
express-max-search-attempts: ${EXPRESS_MAX_SEARCH_ATTEMPTS:3}
express-max-radius-km: ${EXPRESS_MAX_RADIUS_KM:50}

# CORS / Frontend
frontend-url: ${FRONTEND_URL:*}

# Chat
chat-message-max-length: ${CHAT_MESSAGE_MAX_LENGTH:4000}
chat-message-page-size: ${CHAT_MESSAGE_PAGE_SIZE:50}

# Asaas (Pagamentos)
asaas-api-key: ${ASAAS_API_KEY:}
asaas-base-url: ${ASAAS_BASE_URL:https://sandbox.asaas.com/api/v3}
asaas-webhook-token: ${ASAAS_WEBHOOK_TOKEN:}

---

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
