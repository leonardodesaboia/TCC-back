services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    ports:
      - "${APP_PUBLIC_PORT:-8080}:${PORT:-8080}"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      JWT_SECRET: ${JWT_SECRET}
      CPF_ENCRYPTION_KEY: ${CPF_ENCRYPTION_KEY}

      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      PORT: ${PORT:-8080}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-7}
      RESET_CODE_TTL_MINUTES: ${RESET_CODE_TTL_MINUTES:-10}

      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}

      FRONTEND_URL: ${FRONTEND_URL}

      CHAT_MESSAGE_MAX_LENGTH: ${CHAT_MESSAGE_MAX_LENGTH:-4000}
      CHAT_MESSAGE_PAGE_SIZE: ${CHAT_MESSAGE_PAGE_SIZE:-50}

      SEED_ENABLED: ${SEED_ENABLED:-false}
      SEED_PRODUCTION_ENABLED: ${SEED_PRODUCTION_ENABLED:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@allset.com.br}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}

      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET_PREFIX: ${MINIO_BUCKET_PREFIX:-allset}
      MINIO_AUTO_CREATE_BUCKETS: ${MINIO_AUTO_CREATE_BUCKETS:-true}
      MINIO_PRESIGNED_URL_TTL_MINUTES: ${MINIO_PRESIGNED_URL_TTL_MINUTES:-15}
      MINIO_PRESIGNED_URL_TTL_LONG_HOURS: ${MINIO_PRESIGNED_URL_TTL_LONG_HOURS:-24}

      MINIO_MAX_AVATAR_SIZE_MB: ${MINIO_MAX_AVATAR_SIZE_MB:-5}
      MINIO_MAX_DOCUMENT_SIZE_MB: ${MINIO_MAX_DOCUMENT_SIZE_MB:-5}
      MINIO_MAX_ORDER_PHOTO_SIZE_MB: ${MINIO_MAX_ORDER_PHOTO_SIZE_MB:-5}
      MINIO_MAX_CHAT_ATTACHMENT_SIZE_MB: ${MINIO_MAX_CHAT_ATTACHMENT_SIZE_MB:-5}
      MINIO_MAX_CATALOG_ICON_SIZE_MB: ${MINIO_MAX_CATALOG_ICON_SIZE_MB:-1}
      MINIO_MAX_DISPUTE_EVIDENCE_SIZE_MB: ${MINIO_MAX_DISPUTE_EVIDENCE_SIZE_MB:-5}
      MINIO_MAX_DATA_EXPORT_SIZE_MB: ${MINIO_MAX_DATA_EXPORT_SIZE_MB:-100}

      GEOCODING_BASE_URL: ${GEOCODING_BASE_URL:-https://nominatim.openstreetmap.org}
      GEOCODING_USER_AGENT: ${GEOCODING_USER_AGENT}
      GEOCODING_CACHE_TTL_SECONDS: ${GEOCODING_CACHE_TTL_SECONDS:-2592000}
      GEOCODING_NEGATIVE_CACHE_TTL_SECONDS: ${GEOCODING_NEGATIVE_CACHE_TTL_SECONDS:-300}
      GEOCODING_ENABLED: ${GEOCODING_ENABLED:-true}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: